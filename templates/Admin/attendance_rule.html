{% extends "Admin/layout.html" %}
{% block content %}

<div class="main-content">
    <section class="section">
        <div class="section-header">
            <h1>Attendance Rules</h1>
            <div class="section-header-breadcrumb">
                <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
                <div class="breadcrumb-item"><a href="#">Forms</a></div>
                <div class="breadcrumb-item">Attendance Rules</div>
            </div>
        </div>

            <form>
                <div class="form-group">
                    <label>Minimum Attendance Percentage (%)</label>
                    <input type="number" class="form-control" placeholder="e.g. 75">
                </div>

                <div class="form-group">
                    <label>Late Entry Allowed</label>
                    <select class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Auto Mark Absent After (minutes)</label>
                    <input type="number" class="form-control" placeholder="e.g. 15">
                </div>

                <button class="btn btn-primary">Save Rules</button>
            </form>
        </div>

        {% endblock %}
