{% extends "Admin/layout.html" %}
{% block content %}

<div class="main-content">
    <section class="section">
        <div class="section-header">
            <h1>Edit Student</h1>
            <div class="section-header-breadcrumb">
                <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
                <div class="breadcrumb-item"><a href="#">Forms</a></div>
                <div class="breadcrumb-item">Edit Student</div>
            </div>
        </div>

        <div class="section-body">

            <div class="row">
                <div class="col-12 col-md-6 col-lg-12">
                    <div class="card-student">
                        <form padding="20px" action="{{url_for('edit_user_process', Student_id=student[0])}}"
                            method="post" enctype="multipart/form-data">
                            <div class="card-body">
                                <div class="form-group">
                                    <label>Name</label>
                                    <input type="text" class="form-control" name="student_name" value="{{student[1]}}">
                                </div>
                                <div class="form-group">
                                    <label>Division</label>
                                    <select class="form-control" name="Division">
                                        <option value="">Select Division</option>
                                        <option value="Division A" {% if student[2]=="Division A" %}selected{% endif %}>
                                            Division A</option>
                                        <option value="Division B" {% if student[2]=="Division B" %}selected{% endif %}>
                                            Division B</option>
                                        <option value="Division C" {% if student[2]=="Division C" %}selected{% endif %}>
                                            Division C</option>
                                        <option value="Division D" {% if student[2]=="Division D" %}selected{% endif %}>
                                            Division D</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Enrollment Number</label>
                                    <input type="text" class="form-control" name="Enrollment_no"
                                        placeholder="Enter Enrollment Number" value="{{student[3]}}">
                                </div>
                                <div class="form-group">
                                    <label>Department of Student</label>
                                    <select class="form-control" name="Department_id">
                                        <option value="">Select Department</option>
                                        {% for department in departments %}
                                        <option value="{{ department[0] }}" {% if department[0]==student[4] %}selected{%
                                            endif %}>
                                            {{ department[1] }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>Semester of the Student</label>
                                    <input type="text" class="form-control" name="Semester" placeholder="Enter Semester"
                                        value="{{student[5]}}">
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control" name="Email" placeholder="Enter Email"
                                        value="{{student[6]}}" required>
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" class="form-control" name="password" required
                                        placeholder="Enter Password" minlength="6" value="{{student[7]}}">
                                </div>
                                <div class="form-group">
                                    <label>Contact Number</label>
                                    <input type="text" class="form-control" name="contact" required pattern="[0-9]{10}"
                                        title="Please enter a valid 10-digit phone number" value="{{student[8]}}">
                                </div>

                                <div class="card-footer text-right">
                                    <button class="btn btn-primary">Submit</button>
                                </div>
                        </form>
                    </div>

                </div>

            </div>
        </div>
    </section>
</div>
{% endblock %}
