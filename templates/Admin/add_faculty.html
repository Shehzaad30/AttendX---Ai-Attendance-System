{% extends "Admin/layout.html" %}
{% block content %}
<div class="main-content">
    <section class="section">

        <div class="section-header">
            <h1>Add Faculty</h1>
        </div>

        <div class="row">
            <div class="col-lg-12 col-md-8 col-sm-12">
                <div class="card-student">
                    <div class="card-body">

                        <form action="{{url_for('insert_faculty')}}" method="post" width="100%">
                            <div class="form-group">
                                <label>Faculty Name</label>
                                <input type="text" name="Faculty_name" class="form-control"
                                    placeholder="Enter faculty name" required>
                            </div>
                            <div class="form-group">
                                <label>Faculty Email</label>
                                <input type="email" name="Faculty_email" class="form-control"
                                    placeholder="Enter faculty email" required>
                            </div>
                            <div class="form-group">
                                <label>Faculty Password</label>
                                <input type="password" name="Password" class="form-control"
                                    placeholder="Enter faculty password" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label>Faculty Department</label>
                                <select class="form-control" name="Department_id" required="">
                                    <option>Select Department</option>
                                    {% for department in departments %}
                                    <option value="{{ department[0] }}">{{ department[1] }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Faculty Contact Number</label>
                                <input type="text" name="contact" class="form-control"
                                    placeholder="Enter faculty phone number" required pattern="[0-9]{10}"
                                    title="Please enter a valid 10-digit phone number">
                            </div>
                            <div class="form-group">
                                <label>Faculty Image</label>
                                <input type="file" name="Faculty_image" class="form-control-file">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Add Faculty
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}
