{% extends "Admin/layout.html" %}
{% block content %}

<div class="main-content">
    <section class="section">
        <div class="section-header">
            <h1>Camera Settings</h1>
            <div class="section-header-breadcrumb">
                <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
                <div class="breadcrumb-item"><a href="#">Forms</a></div>
                <div class="breadcrumb-item">Camera Settings</div>
            </div>
        </div>

            <form>
                <div class="form-group">
                    <label>Camera Source</label>
                    <select class="form-control">
                        <option>Default Webcam</option>
                        <option>External Camera</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image Resolution</label>
                    <select class="form-control">
                        <option>640 x 480</option>
                        <option>1280 x 720</option>
                        <option>1920 x 1080</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Face Capture Interval (seconds)</label>
                    <input type="number" class="form-control" placeholder="e.g. 3">
                </div>

                <button class="btn btn-primary">Save Camera Settings</button>
            </form>
        </div>
        {% endblock %}
