<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AttendX - Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='admin/assets/modules/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/modules/fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Poppins', sans-serif;
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 380px;
            max-width: 90%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .login-card img {
            width: 150px;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111827;
            text-shadow: 1px 5px 2px rgba(0, 0, 0, 0.1);
        }

        .login-card label {
            font-weight: 200;
            font-size: 14px;
        }

        .form-control:hover {
            border-color: #667eea;
        }

        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        a:hover {
            text-decoration: none;
        }

        input:focus {
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: white;
            opacity: 0.9;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">

            <img src="{{ url_for('static', filename='Admin/assets/img/Screenshot 2026-03-01 150632.png') }}">

            <a href="{{url_for('faculty_login')}}">
                <h5 class="login-title">Admin Login</h5>
            </a>

            <p style="font-size:13px;color:#6b7280;margin-top:-15px;">
                Secure Dashboard Access
            </p>

            <form method="post" action="{{ url_for('alogin_process') }}">

                <div class="form-group text-left mb-3">
                    <label>Email</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fas fa-envelope"></i>
                            </span>
                        </div>
                        <input type="email" name="admin_email" class="form-control" required>
                    </div>
                </div>

                <div class="form-group text-left mb-3">
                    <label>Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                        </div>
                        <input type="password" id="password" name="admin_pass" class="form-control" required>
                    </div>
                </div>

                <div class="form-group text-left mb-3">
                    <input type="checkbox" id="showPassword" onclick="togglePassword()">
                    <label for="showPassword" style="margin-left:5px;">Show Password</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Login
                </button>

            </form>

        </div>

        <div class="footer-text">
            AttendX | Smart Attendance System
        </div>

        <p style="font-size:13px;color:#6b7280;margin-top:-15px;">
            AI Based Attendance Management
        </p>

    </div>

    <script>

        function togglePassword() {
            var passwordField = document.getElementById("password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                document.querySelector("form").submit();
            }
        });

    </script>

</body>

</html>
