{% extends "Admin/layout.html" %}
{% block content %}

<style>
    body {
        background-color: #f4f4f6;
    }
    .main-content {
        padding: 50px;
        margin-left: -150px;
        position: fixed;
        width: 100%;
    }
    .card {
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .card-header {
        background-color: #007bff;
        color: white;
        font-weight: bold;
        border-bottom: none;
    }
    .card-body {
        padding: 20px;
    }
</style>
<div class="main-content">
    <section class="section">

        <div class="main-content">
            <section class="section">
                <div class="section-header">
                    <div class="section-header-breadcrumb">
                        <div class="breadcrumb-item active"><a href="">Dashboard</a></div>
                        <div class="breadcrumb-item"><a href="#">Forms</a></div>
                        <div class="breadcrumb-item">Analytics</div>
                    </div>
                </div>

                <div class="section-body">

                    <!-- Statistics Cards -->
                    <div class="row">

                        <div class="col-lg-3 col-md-6 col-sm-6">
                            <div class="card card-statistic-1">
                                <div class="card-icon bg-primary">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div class="card-wrap">
                                    <div class="card-header">
                                        <h4>Total Users</h4>
                                    </div>
                                    <div class="card-body">320</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 col-sm-6">
                            <div class="card card-statistic-1">
                                <div class="card-icon bg-success">
                                    <i class="fas fa-user-check"></i>
                                </div>
                                <div class="card-wrap">
                                    <div class="card-header">
                                        <h4>Present Today</h4>
                                    </div>
                                    <div class="card-body">278</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 col-sm-6">
                            <div class="card card-statistic-1">
                                <div class="card-icon bg-danger">
                                    <i class="fas fa-user-times"></i>
                                </div>
                                <div class="card-wrap">
                                    <div class="card-header">
                                        <h4>Absent Today</h4>
                                    </div>
                                    <div class="card-body">42</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 col-sm-6">
                            <div class="card card-statistic-1">
                                <div class="card-icon bg-warning">
                                    <i class="fas fa-percentage"></i>
                                </div>
                                <div class="card-wrap">
                                    <div class="card-header">
                                        <h4>Attendance %</h4>
                                    </div>
                                    <div class="card-body">86.9%</div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Charts -->
                    <div class="row">

                        <!-- Attendance Trend -->
                        <div class="col-lg-8">
                            <div class="card">
                                <div class="card-header">
                                    <h4>Weekly Attendance Trend</h4>
                                </div>
                                <div class="card-body">
                                    <canvas id="attendanceChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- Present vs Absent -->
                        <div class="col-lg-4">
                            <div class="card">
                                <div class="card-header">
                                    <h4>Today Attendance</h4>
                                </div>
                                <div class="card-body">
                                    <canvas id="attendancePie"></canvas>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </section>
        </div>
        {% endblock %}
