{% extends "Admin/layout.html" %}
{% block content %}

<div class="main-content">
    <section class="section">

        <div class="section-header">
            <h1>View Departments</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Department Name</th>
                            <th>Code</th> 
                            <th>Hod Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for dept in departments %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ dept[1] }}</td>
                            <td>{{ dept[2] }}</td>
                            <td>{{ dept[3] }}</td>
                            <td><a class="btn btn-success" href="{{url_for('edit_department', Department_id=dept[0])}}">Edit</a> || <a class="btn btn-danger" href="{{url_for('delete_department', Department_id=dept[0])}}">Delete</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </section>
</div>
</body>

{% endblock %}
