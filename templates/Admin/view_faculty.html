{% extends "Admin/layout.html" %}
{% block content %}


<div class="main-content">
    <section class="section">

        <div class="section-header">
            <h1>View Faculty</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Faculty Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for faculty in faculty_members %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{faculty[1]}}</td>
                            <td>{{faculty[2]}}</td>
                            <td>{{faculty[5]}}</td>
                            <td>{{faculty[4]}}</td>
                            <td><a class="btn btn-success" href="{{url_for('edit_faculty', Faculty_id=faculty[0])}}">Edit</a> || <a class="btn btn-danger" href="{{url_for('delete_faculty', Faculty_id=faculty[0])}}">Delete</a></td>
                        </tr>
                    </tbody>
                    {% endfor %}
                </table>
            </div>
        </div>
    </section>
</div>

{% endblock %}
