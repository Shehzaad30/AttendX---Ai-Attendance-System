{% extends "Admin/layout.html" %}
{% block content %}
<div class="main-content">
    <section class="section">

        <div class="section-header">
            <h1>ADD CLASS</h1>
        </div>

        <div class="row">
            <div class="col-lg-12 col-md-8 col-sm-12">
                <div class="card">
                    <div class="card-body">

                        <form action="{{url_for('insert_class')}}" method="post" width="100%">
                            <div class="form-group">
                                <label>Class Name</label>
                                <input type="text" name="class_name" class="form-control" placeholder="Enter class name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label>Faculty Incharge</label>
                                <select class=" form-control" name="Faculty_id" required="">
                                    <option>Select Faculty Incharge</option>
                                    {% for faculty in faculty_members %}
                                    <option value="{{ faculty[0] }}">{{ faculty[1] }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Semester</label>
                                <select class="form-control" name="semester" required="">
                                    <option>Select Semester</option>
                                    <option value="1">1st Semester</option>
                                    <option value="2">2nd Semester</option>
                                    <option value="3">3rd Semester</option>
                                    <option value="4">4th Semester</option>
                                    <option value="5">5th Semester</option>
                                    <option value="6">6th Semester</option>
                                    <option value="7">7th Semester</option>
                                    <option value="8">8th Semester</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Department</label>
                                <select class="form-control" name="Department_id" required="">
                                    <option>Select Department</option>
                                    {% for dep in departments %}
                                    <option value="{{ dep[0] }}">{{ dep[1] }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Room No.</label>
                                <input type="text" name="room_no" class="form-control" placeholder="Enter room no." required>
                            </div>
                            <div class="form-group">
                                <label>Latitude</label>
                                <input type="number" step="any" name="latitude" class="form-control" placeholder="Enter latitude of the class">
                            </div>
                            <div class="form-group">
                                <label>Longitude</label>
                                <input type="number" step="any" name="longitude" class="form-control" placeholder="Enter Longitude of the class">
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" name="date" class="form-control" placeholder="Enter Date of the class">
                            </div>
                            <div class="form-group">
                                <label>Start Time</label>
                                <input type="time" name="start_time" class="form-control" placeholder="Enter starting time of the class">
                            </div>
                            <div class="form-group">
                                <label>End Time</label>
                                <input type="time" name="end_time" class="form-control" placeholder="Enter ending time of the class">
                            </div>
                            <div class="button-group">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}
