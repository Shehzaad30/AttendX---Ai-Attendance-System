{% extends "Admin/layout.html" %}
{% block content %}
<div class="main-content">
    <section class="section">
        <div class="section-header">
            <h1>GPS Range Settings</h1>
            <div class="section-header-breadcrumb">
                <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
                <div class="breadcrumb-item"><a href="#">Forms</a></div>
                <div class="breadcrumb-item">GPS Range Settings</div>
            </div>
        </div>

            <form>
                <div class="form-group">
                    <label>Allowed Radius (meters)</label>
                    <input type="number" class="form-control" placeholder="e.g. 100">
                </div>

                <div class="form-group">
                    <label>Reference Latitude</label>
                    <input type="text" class="form-control" placeholder="e.g. 22.3072">
                </div>

                <div class="form-group">
                    <label>Reference Longitude</label>
                    <input type="text" class="form-control" placeholder="e.g. 73.1812">
                </div>

                <button class="btn btn-primary">Save GPS Settings</button>
            </form>
        </div>
        {% endblock %}
