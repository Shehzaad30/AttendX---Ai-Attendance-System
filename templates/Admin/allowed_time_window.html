{% extends "Admin/layout.html" %}
{% block content %}

<div class="main-content">
    <section class="section">
        <div class="section-header">
            <h1>Allowed Time Window</h1>
            <div class="section-header-breadcrumb">
                <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
                <div class="breadcrumb-item"><a href="#">Forms</a></div>
                <div class="breadcrumb-item">Allowed Time Window</div>
            </div>
        </div>
            <form>
                <div class="form-group">
                    <label>Attendance Start Time</label>
                    <input type="time" class="form-control">
                </div>

                <div class="form-group">
                    <label>Attendance End Time</label>
                    <input type="time" class="form-control">
                </div>

                <div class="form-group">
                    <label>Grace Period (minutes)</label>
                    <input type="number" class="form-control" placeholder="e.g. 10">
                </div>

                <button class="btn btn-primary">Save Time Window</button>
            </form>
        </div>

        {% endblock %}
