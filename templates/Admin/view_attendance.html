{% extends "Admin/layout.html" %}
{% block content %}
<style>
    body {
        margin: 0;
        background-color: #f4f6f9;
    }

    .main-content {
        padding: 100px;
        min-height: 200vh;
    }

    .page-header {
        background: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    table th {
        background-color: #f1f1f1;
    }
</style>

<div class="main-content">

    <div class="page-header d-flex justify-content-between align-items-center">
        <h3>Reports</h3>
        <input type="text" class="form-control w-25" placeholder="Search">
    </div>

    <div class="card p-4 mb-4">
        <div class="row">
            <div class="col-md-3">
                <label>Report Type</label>
                <select class="form-control">
                    <option>Daily</option>
                    <option>Weekly</option>
                    <option>Monthly</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>From Date</label>
                <input type="date" class="form-control">
            </div>

            <div class="col-md-3">
                <label>To Date</label>
                <input type="date" class="form-control">
            </div>

            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100">
                    Generate Report
                </button>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <div class="d-flex justify-content-between mb-3">
            <h5>Attendance Report</h5>
            <div>
                <a href="/export_pdf/{{ j[0] }}" class="btn btn-danger">
                    Export PDF
                </a>
                <button class="btn btn-success btn-sm">Export Excel</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-bordered table-md text-center table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Student Name</th>
                        <th>Enrollment No</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ i[0] }}</td>
                        <td>{{ i[1] }}</td>
                        <td>{{ i[2] }}</td>
                        <td>{{ i[3] }}</td>
                        <td>{{ i[4] }}</td>
                        <td>{{ i[5] }}</td>
                    </tr>
                    {% endfor %}
            </table>
        </div>
    </div>

</div>
{% endblock %}
