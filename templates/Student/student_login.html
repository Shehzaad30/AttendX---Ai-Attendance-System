<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AttendX - Student Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='admin/assets/modules/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/modules/fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-wrapper {
            width: 100%;
            text-align: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 35px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.18);
        }

        .login-card img {
            margin-bottom: 15px;
            width: 150px;
            height: auto;
        }

        .login-card label
        {
            font-weight: 200;
            font-size: 14px;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111827;
        }

        a:hover {
            text-decoration: none;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2);
        }

        .btn-primary {
            background: #14b8a6;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #0f766e;
        }

        .footer-text {
            margin-top: 20px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">
            <img src="{{ url_for('static', filename='Student/assets/img/Screenshot 2026-03-01 150632.png') }}" alt="AttendX Logo"
                class="mb-3">

            <a href="{{url_for('login')}}">

                
                <h5 class="login-title">Student Login</h5>
            </a>

            <form action="{{ url_for('student_login_process') }}" method="post">

                <div class="form-group text-left mb-3">
                    <label>Enrollment No</label>
                    <input type="text" class="form-control" name="Enrollment_no" required autofocus>
                </div>

                <div class="form-group text-left mb-4">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                    <div class="form-group text-left mb-3">
                        <input type="checkbox" id="showPassword" onclick="toggleStudentPassword()">
                        <label for="showPassword" style="margin-left:5px;">Show Password</label>
                    </div>
                    <div>

                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Login
                </button>

            </form>
        </div>

        <div class="footer-text font-weight-bold" style="color: #111827;">
            AttendX | Smart Attendance System
        </div>

    </div>

</body>
<script>
    function toggleStudentPassword() {
        var passwordField = document.getElementById("password");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            
        } else {
            passwordField.type = "password";
        }

    }

</script>
</html>
