{% extends "Student/layout.html" %}
{% block content %}

<h3>Edit Profile</h3>

<div class="card shadow mt-3">
    <div class="card-body">

        <form action="{{url_for('student_edit_profile_process')}}" method="POST">
            {% for j in student %}
            <div class="mb-3">
                <label>Name</label>
                <input type="hidden" name="Student_id" class="form-control" value="{{j[0]}}">

                <input type="text" name="Student_name" class="form-control" value="{{j[1]}}">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="Email" name="Email" class="form-control" value="{{j[2]}}">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="text" name="password" class="form-control" value="{{j[3]}}">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="contact" class="form-control" value="{{j[5]}}">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <select name="Department_id" class="form-control">
                    {% for j in departments %}
                    <option value="{{ j[0] }}" {% if j[0]==student[4] %}selected{% endif %}>
                        {{ j[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Image of the User</label>
                <input type="file" class="form-control-file" id="photo" name="img_of_student">
                <img src="{{ j[9] }}" alt="Student Image" class="img-thumbnail mt-2" width="150">
            </div>

            {% endfor %}

            <button class="btn btn-success" type="submit">Update Profile</button>
        </form>
    </div>
</div>

{% endblock %}
