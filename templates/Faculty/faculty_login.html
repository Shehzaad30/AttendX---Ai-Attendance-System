<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AttendX - Faculty Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='admin/assets/modules/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/modules/fontawesome/css/all.min.css') }}">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ccd58d, #787696, #fcfcff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-wrapper {
            width: 100%;
            text-align: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 35px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.18);
        }

        .login-card img {
            margin-bottom: 15px;
            width: 150px;
            height: auto;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111827;
            text-shadow: 1px 5px 2px rgba(0, 0, 0, 0.1);
        }

        .login-card label {
            font-weight: 200;
            font-size: 14px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .btn-primary {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
        }

        a:hover {
            text-decoration: none;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .footer-text {
            margin-top: 20px;
            color: white;
            font-size: 14px;
        }

        .forgot-link {
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">
            <img src="{{ url_for('static', filename='Faculty/assets/img/Screenshot 2026-03-01 150632.png')}}"
                alt="AttendX Logo" height="60" class="mb-3">

            <a href="{{url_for('student_login')}}">
                <h5 class="login-title">Faculty Login</h5>
            </a>

            <form action="{{ url_for('faculty_login_process') }}" method="POST">

                <div class="form-group text-left mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" name="Faculty_email" required>
                </div>

                <div class="form-group text-left mb-4">
                    <label>Password</label>
                    <input type="password" class="form-control" name="Password" id="Password" required>
                </div>
                <div class="form-group text-left mb-3">
                    <input type="checkbox" id="showFacultyPassword" onclick="toggleFacultyPassword()">
                    <label for="showPFacultyPassword" style="margin-left:5px;">Show Password</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Login
                </button>

            </form>
        </div>

        <div class="footer-text font-weight-bold" style="color: #111827;">
            AttendX | Smart Attendance System
        </div>

    </div>


</body>
<script>
    function toggleFacultyPassword() {
        var passwordField = document.getElementById("Password");

        if (passwordField.type === "password") {
            passwordField.type = "text";
        } else {
            passwordField.type = "password";
        }
    }
</script>

</html>
